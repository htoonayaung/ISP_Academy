services:
  backend:
    # API container intentionally has no Docker socket, privileged mode, host network, or host PID.
    build:
      context: ../backend
    env_file:
      - ./env/backend.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - /opt/isp-academy/lab-storage:/opt/isp-academy/lab-storage
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    # Frontend container intentionally has no Docker socket, privileged mode, host network, or host PID.
    build:
      context: ../frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://10.0.44.2:8000}
    depends_on:
      - backend
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  celery_worker:
    # MVP-only technical debt: Containerlab requires host Docker/network access here.
    # Do not grant these privileges to backend or frontend.
    build:
      context: ../backend
    user: "0:0"
    privileged: true
    network_mode: host
    pid: host
    env_file:
      - ./env/backend.env
    environment:
      POSTGRES_HOST: 127.0.0.1
      REDIS_URL: redis://127.0.0.1:6379/0
      CELERY_BROKER_URL: redis://127.0.0.1:6379/1
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /opt/isp-academy/lab-storage:/opt/isp-academy/lab-storage
      - /usr/bin/containerlab:/usr/bin/containerlab:ro
      - /usr/bin/docker:/usr/bin/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["celery", "-A", "app.workers.celery_app.celery_app", "worker", "--loglevel=INFO"]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file:
      - ./env/backend.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Bound to loopback only; not exposed publicly.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      # Bound to loopback only; not exposed publicly.
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
