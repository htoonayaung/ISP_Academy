[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["app/tests"]
pythonpath = ["."]
env = [
    "APP_NAME=AI-Powered ISP Academy MVP",
    "APP_VERSION=0.1.0",
    "ENVIRONMENT=testing",
    "DEBUG=false",
    "LOG_LEVEL=INFO",
    "POSTGRES_HOST=postgres",
    "POSTGRES_PORT=5432",
    "POSTGRES_USER=isp_academy",
    "POSTGRES_PASSWORD=testing_password",
    "POSTGRES_DB=isp_academy",
    "JWT_SECRET_KEY=testing-secret-key-with-enough-length",
    "JWT_ALGORITHM=HS256",
    "JWT_ACCESS_TOKEN_EXPIRE_MINUTES=30",
    "INITIAL_ADMIN_EMAIL=admin@example.com",
    "INITIAL_ADMIN_USERNAME=admin",
    "INITIAL_ADMIN_PASSWORD=TestingAdminPassword123!",
    "INITIAL_ADMIN_FULL_NAME=Testing Admin",
    "REDIS_URL=redis://redis:6379/0",
    "CELERY_BROKER_URL=redis://redis:6379/1",
    "CELERY_RESULT_BACKEND=redis://redis:6379/2",
    "LAB_ROOT=/tmp/isp-academy-test-labs",
    "CONTAINERLAB_BIN=/usr/bin/containerlab",
    "CONTAINERLAB_COMMAND_TIMEOUT_SECONDS=120",
    "LAB_EVENT_OUTPUT_LIMIT=12000",
    "AI_LAB_BUILDER_ENABLED=false",
    "AI_PROVIDER=mock",
    "AI_API_BASE_URL=http://ai-provider.test/v1",
    "AI_API_KEY=test-ai-key",
    "AI_MODEL=test-model",
    "AI_REQUEST_TIMEOUT_SECONDS=5",
    "AI_MAX_TOKENS=2000"
]

[tool.ruff]
line-length = 100
target-version = "py312"
